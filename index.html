<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <div class="container">
        <header>
            <h1><span>JS</span> calculator</h1>
        </header>
        <div id="res"><p>0</p></div>
        <div class="buttons">
            <div class="operators">
                <button class="button-operators">*</button>
                <button class="button-operators">/</button>
                <button class="button-operators">-</button>
                <button class="button-operators">+</button>
                <button class="button-fun">=</button>
            </div>
            <div class="numbers">
                <div class="function">
                    <button class="button-fun">&#9003;</button>
                    <button class="button-fun">AC</button>
                    <button class="button-operators">%</button>
                </div>
                <div class="function">
                    <button class="button-number">7</button>
                    <button class="button-number">8</button>
                    <button class="button-number">9</button>
                </div>
                <div class="function">
                    <button class="button-number">4</button>
                    <button class="button-number">5</button>
                    <button class="button-number">6</button>
                </div>
                <div class="function">
                    <button class="button-number">1</button>
                    <button class="button-number">2</button>
                    <button class="button-number">3</button>
                </div>
                <div class="function">
                    <button class="button-fun">&plusmn;</button>
                    <button class="button-number">0</button>
                    <button class="button-number">.</button>
                </div>
            </div>
        </div>
    </div>
</body>

<script type="module" src="./js/index.js"></script>

</html>
